spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama4:scout
  datasource:
    url: jdbc:postgresql://localhost:5432/okf
    username: okf
    password: okf
  flyway:
    enabled: false

app:
  okf:
    knowledge-base-path: /tmp/okf-test
    max-files-per-query: 5
    navigation-model: llama4:scout
    extraction-model: llama4:scout
    sync:
      github-url: https://github.com/test/test
      github-token: ""
      interval-ms: 3600000
      enabled: false
      sync-on-startup: false
      use-llm-summarization: false
