server:
  port: ${SERVER_PORT:8090}
  shutdown: graceful

spring:
  application:
    name: llm-OKF
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mvc:
    async:
      request-timeout: 120000
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/okf}
    username: ${DB_USER:okf}
    password: ${DB_PASSWORD:okf}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:llama4:scout}
        temperature: 0.3
        num-ctx: ${OLLAMA_CTX:4096}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      access: unrestricted
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        okf.chat: true
        okf.chat.stream: true
        gen.ai.client.operation: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  okf:
    knowledge-base-path: ${OKF_KB_PATH:/home/himansu/projects/okf}
    max-files-per-query: ${OKF_MAX_FILES:5}
    navigation-model: ${OKF_NAV_MODEL:llama4:scout}
    extraction-model: ${OKF_EXTRACTION_MODEL:qwen3.6:27b}
    sync:
      github-url: ${GITHUB_REPO_URL}
      github-token: ${GITHUB_TOKEN:}
      interval-ms: ${OKF_SYNC_INTERVAL_MS:3600000}
      enabled: ${OKF_SYNC_ENABLED:true}
      sync-on-startup: ${OKF_SYNC_ON_STARTUP:true}
      use-llm-summarization: ${OKF_LLM_SUMMARIZE:true}
