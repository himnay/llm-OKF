services:
  postgres:
    image: postgres:16-alpine
    container_name: okf-postgres
    environment:
      POSTGRES_DB: okf
      POSTGRES_USER: okf
      POSTGRES_PASSWORD: okf
    ports:
      - "5432:5432"
    volumes:
      - okf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okf -d okf"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  redis:
    image: redis:7-alpine
    container_name: okf-redis
    ports:
      - "6379:6379"
    volumes:
      - okf_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  redisinsight:
    image: redis/redisinsight:latest
    container_name: okf-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: okf-otel-collector
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./config/otel-collector-config.yml:/etc/otel/config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
  prometheus:
    image: prom/prometheus:latest
    container_name: okf-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - okf_prometheusdata:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
  tempo:
    image: grafana/tempo:latest
    container_name: okf-tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./config/tempo.yml:/etc/tempo/config.yml
      - okf_tempodata:/var/tempo
    ports:
      - "3200:3200"
      - "4418:4418"
  grafana:
    image: grafana/grafana:latest
    container_name: okf-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - okf_grafanadata:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo

volumes:
  okf_pgdata:
    driver: local
  okf_redisdata:
    driver: local
  okf_ollama:
    driver: local
  okf_prometheusdata:
    driver: local
  okf_tempodata:
    driver: local
  okf_grafanadata:
    driver: local
